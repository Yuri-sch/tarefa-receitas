<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Sistema de Receitas</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
    {% if request.session.usuario_id %}
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark mb-4">
        <div class="container">
            <a class="navbar-brand" href="{% url 'lista_receitas' %}">Gerenciador de Receitas</a>
            <div class="d-flex text-white align-items-center">
                <span class="me-3">Olá, {{ request.session.usuario_nome }}</span>
                <a href="{% url 'logout' %}" class="btn btn-outline-danger btn-sm">Sair</a>
            </div>
        </div>
    </nav>
    {% endif %}

    <div class="container">
        {% block content %}{% endblock %}
    </div>
</body>
</html>
