{% extends 'base.html' %}

{% block content %}
<div class="row justify-content-center mt-5">
    <div class="col-md-4 col-sm-8">
        <div class="card shadow">
            <div class="card-header bg-dark text-white text-center py-3">
                <h4 class="mb-0">Faça seu Login</h4>
            </div>
            <div class="card-body p-4">
                
                {% if messages %}
                    {% for message in messages %}
                        <div class="alert alert-danger py-2" role="alert">
                            {{ message }}
                        </div>
                    {% endfor %}
                {% endif %}

                <form method="POST" action="{% url 'login' %}">
                    {% csrf_token %}
                    
                    <div class="mb-3">
                        <label for="login" class="form-label fw-bold">Login</label>
                        <input type="text" class="form-control" id="login" name="login" placeholder="Introduza o seu login" required>
                    </div>
                    
                    <div class="mb-4">
                        <label for="senha" class="form-label fw-bold">Senha</label>
                        <input type="password" class="form-control" id="senha" name="senha" placeholder="Introduza a sua senha" required>
                    </div>
                    
                    <div class="d-grid">
                        <button type="submit" class="btn btn-primary btn-lg">Entrar</button>
                    </div>
                </form>
                
            </div>
        </div>
    </div>
</div>
{% endblock %}
